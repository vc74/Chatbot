<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot - Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-surface: #161b22;
            --bg-elevated: #21262d;
            --text-primary: #f0f6fc;
            --text-secondary: #7d8590;
            --accent: #4285f4;
            --accent-hover: #5a9bff;
            --border: #30363d;
            --success: #00d084;
            --warning: #ff9500;
            --error: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .header .actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-elevated);
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--border);
            transform: translateY(-1px);
        }

        .btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn.primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .stat-change {
            font-size: 12px;
            font-weight: 500;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .stat-change.positive {
            background: rgba(0, 208, 132, 0.1);
            color: var(--success);
        }

        .stat-change.negative {
            background: rgba(255, 107, 107, 0.1);
            color: var(--error);
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .chart-card h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .activity-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .activity-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 14px;
        }

        .activity-icon.chat {
            background: rgba(66, 133, 244, 0.1);
            color: var(--accent);
        }

        .activity-icon.user {
            background: rgba(0, 208, 132, 0.1);
            color: var(--success);
        }

        .activity-icon.session {
            background: rgba(255, 149, 0, 0.1);
            color: var(--warning);
        }

        .activity-content {
            flex: 1;
        }

        .activity-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .activity-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .sessions-table {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            overflow-x: auto;
        }

        .sessions-table h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
        }

        td {
            font-size: 14px;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .session-title {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.active {
            background: rgba(0, 208, 132, 0.1);
            color: var(--success);
        }

        .status-badge.inactive {
            background: rgba(125, 133, 144, 0.1);
            color: var(--text-secondary);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
            
            .header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Analytics Dashboard</h1>
            <div class="actions">
                <button class="btn" id="refresh-btn">🔄 Refresh</button>
                <a href="/chat" class="btn primary">← Back to Chat</a>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Loading analytics data...</div>
        </div>

        <div id="dashboard-content" style="display: none;">
            <!-- Stats Overview -->
            <div class="stats-grid" id="stats-grid">
                <!-- Stats cards will be populated here -->
            </div>

            <!-- Charts -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>📈 Usage Over Time</h3>
                    <div class="chart-container">
                        <canvas id="usageChart"></canvas>
                    </div>
                </div>
                
                <div class="chart-card">
                    <h3>🕒 Recent Activity</h3>
                    <div class="activity-list" id="activity-list">
                        <!-- Activity items will be populated here -->
                    </div>
                </div>
            </div>

            <!-- Recent Sessions -->
            <div class="sessions-table">
                <h3>💬 Recent Chat Sessions</h3>
                <table id="sessions-table">
                    <thead>
                        <tr>
                            <th>Session</th>
                            <th>Messages</th>
                            <th>Tokens</th>
                            <th>Created</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="sessions-tbody">
                        <!-- Sessions will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let usageChart = null;
        
        // Check authentication
        const apiKey = localStorage.getItem('chatbot_api_key');
        if (!apiKey) {
            window.location.href = '/auth';
        }

        async function fetchWithAuth(url) {
            const response = await fetch(url, {
                headers: {
                    'Authorization': `Bearer ${apiKey}`
                }
            });
            
            if (response.status === 401) {
                localStorage.removeItem('chatbot_api_key');
                localStorage.removeItem('chatbot_user');
                window.location.href = '/auth';
                return null;
            }
            
            return response;
        }

        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString();
        }

        function formatDateTime(dateString) {
            return new Date(dateString).toLocaleString();
        }

        function timeAgo(dateString) {
            const now = new Date();
            const date = new Date(dateString);
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (days > 0) return `${days}d ago`;
            if (hours > 0) return `${hours}h ago`;
            if (minutes > 0) return `${minutes}m ago`;
            return 'Just now';
        }

        function createStatCard(label, value, change = null) {
            return `
                <div class="stat-card">
                    <div class="stat-value">${formatNumber(value || 0)}</div>
                    <div class="stat-label">${label}</div>
                    ${change ? `<div class="stat-change ${change > 0 ? 'positive' : 'negative'}">
                        ${change > 0 ? '↑' : '↓'} ${Math.abs(change)}%
                    </div>` : ''}
                </div>
            `;
        }

        function createActivityItem(activity) {
            let icon, iconClass, title;
            
            switch (activity.event_type) {
                case 'chat_message':
                    icon = '💬';
                    iconClass = 'chat';
                    title = 'Chat message sent';
                    break;
                case 'user_login':
                    icon = '👤';
                    iconClass = 'user';
                    title = 'User logged in';
                    break;
                case 'session_created':
                    icon = '🆕';
                    iconClass = 'session';
                    title = 'New chat session';
                    break;
                default:
                    icon = '📊';
                    iconClass = 'chat';
                    title = activity.event_type;
            }
            
            return `
                <div class="activity-item">
                    <div class="activity-icon ${iconClass}">${icon}</div>
                    <div class="activity-content">
                        <div class="activity-title">${title}</div>
                        <div class="activity-time">${timeAgo(activity.timestamp)}</div>
                    </div>
                </div>
            `;
        }

        function createSessionRow(session) {
            return `
                <tr>
                    <td>
                        <div class="session-title" title="${session.title}">${session.title}</div>
                    </td>
                    <td>${session.message_count || 0}</td>
                    <td>${formatNumber(session.total_tokens || 0)}</td>
                    <td>${formatDate(session.created_at)}</td>
                    <td>
                        <span class="status-badge ${session.is_active ? 'active' : 'inactive'}">
                            ${session.is_active ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                </tr>
            `;
        }

        async function loadAnalytics() {
            try {
                const response = await fetchWithAuth('/api/analytics');
                if (!response) return;
                
                const data = await response.json();
                
                // Populate stats
                const statsGrid = document.getElementById('stats-grid');
                const stats = data.stats || {};
                
                statsGrid.innerHTML = [
                    createStatCard('Total Sessions', stats.total_sessions),
                    createStatCard('Total Messages', stats.total_messages),
                    createStatCard('Total Tokens', stats.total_tokens),
                    createStatCard('Avg Tokens/Message', Math.round(stats.avg_tokens_per_message || 0))
                ].join('');
                
                // Populate activity
                const activityList = document.getElementById('activity-list');
                const recentActivity = data.recent_activity || [];
                
                if (recentActivity.length > 0) {
                    activityList.innerHTML = recentActivity
                        .slice(0, 10)
                        .map(createActivityItem)
                        .join('');
                } else {
                    activityList.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-secondary);">No recent activity</div>';
                }
                
            } catch (error) {
                console.error('Failed to load analytics:', error);
                document.getElementById('stats-grid').innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--error);">Failed to load analytics data</div>';
            }
        }

        async function loadSessions() {
            try {
                const response = await fetchWithAuth('/api/sessions');
                if (!response) return;
                
                const data = await response.json();
                const sessions = data.sessions || [];
                
                const tbody = document.getElementById('sessions-tbody');
                
                if (sessions.length > 0) {
                    tbody.innerHTML = sessions
                        .slice(0, 10)
                        .map(createSessionRow)
                        .join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-secondary);">No sessions found</td></tr>';
                }
                
            } catch (error) {
                console.error('Failed to load sessions:', error);
                document.getElementById('sessions-tbody').innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--error);">Failed to load sessions</td></tr>';
            }
        }

        function createUsageChart() {
            const ctx = document.getElementById('usageChart').getContext('2d');
            
            // Generate sample data for the last 7 days
            const days = [];
            const messages = [];
            
            for (let i = 6; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                days.push(date.toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' }));
                messages.push(Math.floor(Math.random() * 50) + 10);
            }
            
            usageChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: days,
                    datasets: [{
                        label: 'Messages',
                        data: messages,
                        borderColor: '#4285f4',
                        backgroundColor: 'rgba(66, 133, 244, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: '#30363d'
                            },
                            ticks: {
                                color: '#7d8590'
                            }
                        },
                        y: {
                            grid: {
                                color: '#30363d'
                            },
                            ticks: {
                                color: '#7d8590'
                            }
                        }
                    }
                }
            });
        }

        async function loadDashboard() {
            const loading = document.getElementById('loading');
            const content = document.getElementById('dashboard-content');
            
            loading.style.display = 'block';
            content.style.display = 'none';
            
            await Promise.all([
                loadAnalytics(),
                loadSessions()
            ]);
            
            createUsageChart();
            
            loading.style.display = 'none';
            content.style.display = 'block';
        }

        // Event listeners
        document.getElementById('refresh-btn').addEventListener('click', loadDashboard);

        // Load dashboard on page load
        loadDashboard();
    </script>
</body>
</html>
