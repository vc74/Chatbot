<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatBot — Powered by Groq</title>
  <!-- Marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- highlight.js for code blocks -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #0f0f1a;
      --bg-card:    #1a1a2e;
      --bg-bubble:  #23233a;
      --bg-input:   #23233a;
      --accent1:    #7c3aed;
      --accent2:    #4f46e5;
      --text-main:  #e2e8f0;
      --text-muted: #64748b;
      --green:      #4ade80;
      --border:     #2a2a40;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-deep);
      color: var(--text-main);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      background: radial-gradient(ellipse at top, #1a1040 0%, #0f0f1a 70%);
    }

    /* ── Layout ─────────────────────────────────────── */
    .chat-wrapper {
      width: 100%;
      max-width: 700px;
      height: min(90vh, 820px);
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border-radius: 24px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────── */
    .chat-header {
      flex-shrink: 0;
      background: linear-gradient(100deg, var(--accent1), var(--accent2));
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-avatar {
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.18);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-text { flex: 1; }
    .header-text h1 { font-size: 1.05rem; font-weight: 700; color: #fff; }

    .header-status {
      font-size: 0.74rem;
      color: rgba(255,255,255,0.75);
      display: flex; align-items: center; gap: 5px;
      margin-top: 2px;
    }
    .header-status::before {
      content: '';
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      display: inline-block;
    }

    .header-actions { display: flex; gap: 8px; }

    .icon-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 10px;
      width: 36px; height: 36px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      color: #fff;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.28); }
    .icon-btn svg { width: 16px; height: 16px; fill: currentColor; }

    /* ── Messages area ───────────────────────────────── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--accent1) transparent;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--accent1); border-radius: 4px; }

    /* ── Message bubbles ─────────────────────────────── */
    .message {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 88%;
      animation: msgIn 0.22s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot  { align-self: flex-start; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      background: var(--bg-bubble);
    }
    .message.user .msg-avatar {
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
    }

    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 0.91rem;
      line-height: 1.55;
      word-break: break-word;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: var(--bg-bubble);
      color: var(--text-main);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    /* Markdown inside bot bubble */
    .bubble p  { margin-bottom: 0.5em; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { padding-left: 1.4em; margin-bottom: 0.5em; }
    .bubble li { margin-bottom: 0.2em; }
    .bubble h1,.bubble h2,.bubble h3 { margin: 0.6em 0 0.3em; font-size: 1em; }
    .bubble strong { color: #c4b5fd; }
    .bubble code {
      background: rgba(0,0,0,0.35);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }
    .bubble pre {
      background: #0d0d1a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble pre code {
      background: none;
      padding: 0;
      font-size: 0.83em;
    }

    /* timestamp */
    .msg-meta {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 3px;
      padding: 0 4px;
    }
    .message.user .msg-meta { text-align: right; }

    /* ── Typing indicator ────────────────────────────── */
    .typing-row {
      display: none;
      align-self: flex-start;
      align-items: flex-end;
      gap: 8px;
      animation: msgIn 0.22s ease;
    }
    .typing-row.visible { display: flex; }

    .typing-bubble {
      background: var(--bg-bubble);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 13px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .dot {
      width: 7px; height: 7px;
      background: var(--accent1);
      border-radius: 50%;
      animation: bounce 1.3s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); opacity: 0.6; }
      40%          { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Suggestions chips ───────────────────────────── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 12px;
    }
    .chip {
      background: var(--bg-bubble);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.8rem;
      color: #a78bfa;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s;
      white-space: nowrap;
    }
    .chip:hover { background: var(--accent1); border-color: var(--accent1); color: #fff; }

    /* ── Input bar ───────────────────────────────────── */
    .chat-footer {
      flex-shrink: 0;
      background: #13131f;
      border-top: 1px solid var(--border);
      padding: 12px 14px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: var(--bg-input);
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 10px 16px;
      color: var(--text-main);
      font-size: 0.91rem;
      outline: none;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    #user-input:focus { border-color: var(--accent1); }
    #user-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(124,58,237,0.4);
    }
    #send-btn:hover  { transform: scale(1.07); box-shadow: 0 6px 18px rgba(124,58,237,0.55); }
    #send-btn:active { transform: scale(0.94); opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #send-btn svg { width: 18px; height: 18px; fill: #fff; }

    .footer-hint {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ── Toast ───────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #23233a;
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 520px) {
      body { padding: 0; align-items: stretch; }
      .chat-wrapper { border-radius: 0; height: 100dvh; max-width: 100%; }
    }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <div class="chat-header">
    <div class="header-avatar">🤖</div>
    <div class="header-text">
      <h1>ChatBot</h1>
      <div class="header-status" id="status-text">Powered by Groq · LLaMA 3.3 70B</div>
    </div>
    <div class="header-actions">
      <!-- Clear chat -->
      <button class="icon-btn" id="clear-btn" title="Clear chat" aria-label="Clear chat">
        <svg viewBox="0 0 24 24"><path d="M19 6H5l1.5 14h11L19 6zm-9 10V10h2v6h-2zm4 0V10h2v6h-2zM9 4V3h6v1h4v2H5V4h4z"/></svg>
      </button>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="chat-messages" role="log" aria-live="polite" aria-label="Chat messages">
    <div class="message bot" id="welcome-msg">
      <div class="msg-avatar">🤖</div>
      <div>
        <div class="bubble">Hey there! 👋 I'm <strong>ChatBot</strong>, powered by <strong>Groq + LLaMA 3</strong>.<br>Ask me anything — I'm here to help!</div>
        <div class="msg-meta">Now</div>
      </div>
    </div>
  </div>

  <!-- Typing indicator -->
  <div class="typing-row" id="typing-indicator" aria-hidden="true">
    <div class="msg-avatar">🤖</div>
    <div class="typing-bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <!-- Suggestion chips -->
  <div class="suggestions" id="suggestions">
    <button class="chip">👋 Say hello</button>
    <button class="chip">💡 Explain quantum computing</button>
    <button class="chip">😄 Tell me a joke</button>
    <button class="chip">🐍 Write a Python snippet</button>
  </div>

  <!-- Input area -->
  <div class="chat-footer">
    <div class="input-row">
      <textarea
        id="user-input"
        placeholder="Message ChatBot…"
        rows="1"
        autocomplete="off"
        aria-label="Message input"
      ></textarea>
      <button id="send-btn" aria-label="Send message">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="footer-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</p>
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
  // ── Config ──────────────────────────────────────────
  marked.setOptions({
    breaks: true,
    highlight: (code, lang) => {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    }
  });

  // ── State ───────────────────────────────────────────
  let conversationHistory = [];   // [{role, content}, ...]
  let isWaiting = false;

  // ── DOM refs ─────────────────────────────────────────
  const messagesEl   = document.getElementById('chat-messages');
  const inputEl      = document.getElementById('user-input');
  const sendBtn      = document.getElementById('send-btn');
  const typingEl     = document.getElementById('typing-indicator');
  const clearBtn     = document.getElementById('clear-btn');
  const suggestionsEl= document.getElementById('suggestions');
  const statusEl     = document.getElementById('status-text');
  const toastEl      = document.getElementById('toast');

  // ── Helpers ──────────────────────────────────────────
  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function showToast(msg, duration = 2500) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), duration);
  }

  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }

  function scrollToBottom() {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
  }

  function setWaiting(val) {
    isWaiting = val;
    sendBtn.disabled = val;
    inputEl.disabled = val;
    statusEl.textContent = val ? 'Thinking…' : 'Powered by Groq · LLaMA 3';
  }

  // ── Append a message bubble ───────────────────────────
  function appendMessage(text, sender) {
    // Hide suggestions after first user message
    if (sender === 'user' && suggestionsEl.style.display !== 'none') {
      suggestionsEl.style.display = 'none';
    }

    const wrapper = document.createElement('div');
    wrapper.className = `message ${sender}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = sender === 'bot' ? '🤖' : '🧑';

    const inner = document.createElement('div');

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (sender === 'bot') {
      // Render markdown for bot messages
      bubble.innerHTML = marked.parse(text);
      // Syntax-highlight any code blocks
      bubble.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    } else {
      bubble.textContent = text;
    }

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = getTime();

    inner.appendChild(bubble);
    inner.appendChild(meta);
    wrapper.appendChild(avatar);
    wrapper.appendChild(inner);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
  }

  // ── Send message to backend ───────────────────────────
  async function sendMessage() {
    const message = inputEl.value.trim();
    if (!message || isWaiting) return;

    appendMessage(message, 'user');
    conversationHistory.push({ role: 'user', content: message });

    inputEl.value = '';
    inputEl.style.height = 'auto';
    inputEl.focus();

    setWaiting(true);
    typingEl.classList.add('visible');
    scrollToBottom();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message,
          // Send only last 20 turns to avoid token overflow
          history: conversationHistory.slice(-20)
        })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      typingEl.classList.remove('visible');
      appendMessage(data.reply, 'bot');
      conversationHistory.push({ role: 'assistant', content: data.reply });

    } catch (err) {
      typingEl.classList.remove('visible');
      appendMessage('⚠️ Something went wrong. Please try again.', 'bot');
      console.error(err);
    } finally {
      setWaiting(false);
    }
  }

  // ── Clear chat ────────────────────────────────────────
  clearBtn.addEventListener('click', () => {
    conversationHistory = [];
    messagesEl.innerHTML = '';
    suggestionsEl.style.display = 'flex';

    // Restore welcome message
    const wMsg = document.createElement('div');
    wMsg.className = 'message bot';
    wMsg.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div>
        <div class="bubble">Chat cleared! Start a new conversation. 🧹</div>
        <div class="msg-meta">${getTime()}</div>
      </div>`;
    messagesEl.appendChild(wMsg);
    showToast('Chat cleared');
  });

  // ── Suggestion chips ──────────────────────────────────
  suggestionsEl.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      // Strip leading emoji for cleaner message
      inputEl.value = chip.textContent.replace(/^[\p{Emoji}\s]+/u, '').trim();
      autoResize();
      sendMessage();
    });
  });

  // ── Event listeners ───────────────────────────────────
  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', autoResize);

  // Focus input on load
  inputEl.focus();
</script>
</body>
</html>
